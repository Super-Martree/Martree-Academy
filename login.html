<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Login | Martree Academy</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<header class="top">
  <div class="wrap topInner">
    <div class="brand">
      <div class="logoWrap" aria-hidden="true">🌳</div>
      <div class="brandText">
        <h1>Login</h1>
        <p>Acesse o admin do Martree Academy</p>
      </div>
    </div>
  </div>
</header>

<main class="wrap">
  <section class="card adminCard">

    <div class="topActions">
      <a class="btn ghost" href="index.html">Voltar</a>
    </div>

    <!-- ✅ SEU FORM -->
    <form id="formLogin" class="formGrid" style="grid-template-columns:1fr;">
      <div class="field">
        <label>E-mail</label>
        <input id="email" type="email" required placeholder="seuemail@martree.com"/>
      </div>

      <div class="field">
        <label>Senha</label>
        <input id="password" type="password" required placeholder="••••••••"/>
        <small class="muted" id="msg"></small>
      </div>

      <div class="formActions" style="justify-content:space-between;">
        <button class="btn ghost" type="button" id="btnSignup">Criar conta</button>
        <button class="btn" type="submit" id="btnLogin">Entrar</button>
      </div>
    </form>

    <div style="margin-top:12px;">
      <button class="btn ghost" type="button" id="btnLogout" style="width:100%;">Sair (limpar sessão)</button>
    </div>

  </section>
</main>

<!-- ✅ ANTES do login.js -->

<script src="login.js"></script>
</body>
</html>
